name: Update Rebar Dashboards

on:
  schedule:
    # Every Monday at 11:00 UTC = 6:00 AM Central Time (CT)
    - cron: "0 11 * * 1"
  workflow_dispatch:   # also allows manual trigger from GitHub UI

permissions:
  contents: write      # needed to commit the regenerated HTML files

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run dashboard update script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY:  ${{ secrets.EIA_API_KEY }}
        run: python scripts/update_dashboards.py

      - name: Commit and push updated dashboards
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/texas.html
          git diff --cached --quiet || git commit -m "chore: weekly dashboard update $(date -u +'%Y-%m-%d')"
          git push
